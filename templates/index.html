<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador de Dígitos</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #fafafa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h2 {
            margin-bottom: 5px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        canvas {
            border: 2px solid #333;
            background-color: white;
            cursor: crosshair;
            touch-action: none;
        }
        .controls {
            margin-top: 15px;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            margin: 0 5px;
        }
        h3 {
            margin-top: 20px;
        }
        #result {
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>

    <h2>Clasificador de Dígitos</h2>
    <p>Dibuja un número del 0 al 9</p>
    
    <canvas id="canvas" width="200" height="200"></canvas>
    
    <div class="controls">
        <button onclick="predictDigit()">Predecir</button>
        <button onclick="clearCanvas()">Borrar</button>
    </div>

    <h3>Resultado: <span id="result">-</span></h3>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'black';

        function start(e) {
            painting = true;
            draw(e);
        }

        function end() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchend', end);
        canvas.addEventListener('touchmove', draw);

        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('result').innerText = '-';
        }

        clearCanvas();

        function predictDigit() {
            canvas.toBlob(function(blob) {
                const formData = new FormData();
                formData.append('image', blob, 'digit.png');

                fetch('/predict', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert('Error: ' + data.error);
                    } else {
                        document.getElementById('result').innerText = `${data.digit} (${data.confidence})`;
                    }
                })
                .catch(error => {
                    alert('Error de conexión con el servidor.');
                });
            }, 'image/png');
        }
    </script>
</body>
</html>
